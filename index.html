<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BINGO LIVE - Multi Room</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .badge { display: inline-block; padding: 5px 15px; border-radius: 20px; font-size: 12px; margin-bottom: 10px; font-weight: bold; }
        .host-badge { background: #ffeaa7; color: #d63031; }
        .viewer-badge { background: #dfe6e9; color: #636e72; }
        #current-number { font-size: 100px; font-weight: bold; color: #e74c3c; margin: 20px 0; height: 140px; display: flex; align-items: center; justify-content: center; background: #fff5f5; border-radius: 15px; border: 4px solid #ff7675; }
        button { font-size: 16px; padding: 12px; width: 100%; border-radius: 50px; border: none; background: #0984e3; color: white; cursor: pointer; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; text-align: center; }
        #history { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; }
        .history-item { width: 30px; height: 30px; line-height: 30px; background: #dfe6e9; border-radius: 50%; font-size: 12px; }
        .last-digit { background: #ff7675 !important; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div id="status-badge"><span class="badge">ロビー</span></div>
    <h1>🎉 BINGO LIVE</h1>

    <div id="room-setup">
        <p>ルーム名（合言葉）を決めてください</p>
        <input type="text" id="room-input" placeholder="例: wedding2026">
        <button onclick="startBingo(true)">運営者として開始</button>
        <p style="font-size: 12px; color: #666;">または招待URLから参加してください</p>
    </div>

    <div id="main-game" style="display:none;">
        <div id="room-info" style="font-size: 14px; margin-bottom: 10px; font-weight: bold; color: #0984e3;"></div>
        <div id="current-number">?</div>
        
        <div id="host-controls" style="display: none;">
            <button id="draw-btn" onclick="drawNumber()">数字を引く！</button>
            <button onclick="copyInviteURL()" style="background: #00b894;">招待URLをコピー</button>
            <button onclick="resetBingo()" style="background: #636e72;">リセット</button>
        </div>
        
        <div style="font-size:14px; color:#666; margin-top: 10px;">出た数字の履歴</div>
        <div id="history"></div>
    </div>
</div>

<script>
    let peer, conn, connections = [];
    let roomName = "";
    let isHost = false;
    let numbers = [];
    let history = [];

    // URLにroomパラメータがあるかチェック
    const urlParams = new URLSearchParams(window.location.search);
    const roomParam = urlParams.get('room');
    if (roomParam) {
        document.getElementById('room-input').value = roomParam;
        startBingo(false); // 参加者として自動開始
    }

    function startBingo(hostMode) {
        roomName = document.getElementById('room-input').value;
        if (!roomName) return alert("ルーム名を入力してください");

        isHost = hostMode;
        document.getElementById('room-setup').style.display = 'none';
        document.getElementById('main-game').style.display = 'block';
        document.getElementById('room-info').innerText = `Room: ${roomName}`;

        // ホストなら ID = roomName、参加者なら ID = ランダム
        const peerId = isHost ? roomName : null;
        peer = new Peer(peerId);

        peer.on('open', (id) => {
            if (isHost) {
                setupHost();
            } else {
                setupViewer(roomName);
            }
        });

        peer.on('error', (err) => {
            if (err.type === 'unavailable-id') {
                alert("そのルーム名は既に使用されています。別の名前を試すか、参加者として入ってください。");
                location.reload();
            }
            console.error(err);
        });
    }

    function setupHost() {
        document.getElementById('status-badge').innerHTML = '<span class="badge host-badge">運営者</span>';
        document.getElementById('host-controls').style.display = 'block';
        
        // 履歴の読み込み（ルーム名ごとに保存）
        numbers = JSON.parse(localStorage.getItem(`bingo_nums_${roomName}`)) || Array.from({length: 75}, (_, i) => i + 1);
        history = JSON.parse(localStorage.getItem(`bingo_hist_${roomName}`)) || [];
        updateUI(history[history.length-1] || '?', history);

        peer.on('connection', (c) => {
            connections.push(c);
            c.on('open', () => {
                c.send({ type: 'sync', history: history, current: history[history.length-1] || '?' });
            });
        });
    }

    function setupViewer(targetRoom) {
        document.getElementById('status-badge').innerHTML = '<span class="badge viewer-badge">参加者：接続中...</span>';
        conn = peer.connect(targetRoom);
        conn.on('open', () => {
            document.getElementById('status-badge').innerHTML = '<span class="badge viewer-badge">参加者：同期中 ✅</span>';
        });
        conn.on('data', (data) => {
            if (data.type === 'shuffle') startShuffle();
            if (data.type === 'result' || data.type === 'sync') {
                clearInterval(shuffleInterval);
                updateUI(data.current || data.number, data.history);
            }
        });
    }

    let shuffleInterval;
    function startShuffle() {
        const display = document.getElementById('current-number');
        clearInterval(shuffleInterval);
        shuffleInterval = setInterval(() => {
            display.innerText = Math.floor(Math.random() * 75) + 1;
        }, 80);
    }

    function drawNumber() {
        if (numbers.length === 0) return;
        const btn = document.getElementById('draw-btn');
        btn.disabled = true;
        connections.forEach(c => c.send({ type: 'shuffle' }));
        startShuffle();

        setTimeout(() => {
            const drawn = numbers.splice(Math.floor(Math.random() * numbers.length), 1)[0];
            history.push(drawn);
            
            localStorage.setItem(`bingo_nums_${roomName}`, JSON.stringify(numbers));
            localStorage.setItem(`bingo_hist_${roomName}`, JSON.stringify(history));

            clearInterval(shuffleInterval);
            updateUI(drawn, history);
            connections.forEach(c => c.send({ type: 'result', number: drawn, history: history }));
            btn.disabled = false;
        }, 3000);
    }

    function updateUI(current, newHistory) {
        document.getElementById('current-number').innerText = current;
        const historyDiv = document.getElementById('history');
        historyDiv.innerHTML = newHistory.slice().reverse().map((n, i) => 
            `<div class="history-item ${i===0?'last-digit':''}">${n}</div>`
        ).join('');
    }

    function copyInviteURL() {
        const inviteURL = `${window.location.origin}${window.location.pathname}?room=${roomName}`;
        navigator.clipboard.writeText(inviteURL).then(() => alert("招待URLをコピーしました！"));
    }

    function resetBingo() {
        if(confirm('このルームのデータをリセットしますか？')){
            localStorage.removeItem(`bingo_nums_${roomName}`);
            localStorage.removeItem(`bingo_hist_${roomName}`);
            location.href = window.location.origin + window.location.pathname;
        }
    }
</script>
</body>
</html>
