<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リアルタイムBINGO - 同期システム</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; background: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .badge { display: inline-block; padding: 5px 15px; border-radius: 20px; font-size: 12px; margin-bottom: 10px; font-weight: bold; }
        .host-badge { background: #ffeaa7; color: #d63031; }
        .viewer-badge { background: #dfe6e9; color: #636e72; }
        #current-number { font-size: 100px; font-weight: bold; color: #e74c3c; margin: 20px 0; height: 140px; display: flex; align-items: center; justify-content: center; background: #fff5f5; border-radius: 15px; border: 4px solid #ff7675; }
        button { font-size: 20px; padding: 12px 30px; cursor: pointer; background: #0984e3; color: white; border: none; border-radius: 50px; box-shadow: 0 4px 15px rgba(9, 132, 227, 0.3); width: 100%; margin-bottom: 10px; }
        button:disabled { background: #b2bec3; cursor: not-allowed; }
        #history { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin-top: 15px; }
        .history-item { width: 30px; height: 30px; line-height: 30px; background: #dfe6e9; border-radius: 50%; font-size: 12px; font-weight: bold; }
        .last-digit { background: #ff7675; color: white; transform: scale(1.1); }
        .setup-area { background: #f9f9f9; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 14px; }
        #room-id-display { font-weight: bold; color: #0984e3; font-size: 18px; }
    </style>
</head>
<body>

<div class="container">
    <div id="role-display"></div>
    <h1>🎉 BINGO LIVE</h1>

    <div id="setup" class="setup-area">
        <p>【運営者】IDを参加者に伝えてください</p>
        <div id="room-id-display">接続中...</div>
        <hr>
        <p>【参加者】IDを入力して接続</p>
        <input type="text" id="join-id" placeholder="IDを入力" style="padding: 8px; width: 60%; border-radius: 5px; border: 1px solid #ccc;">
        <button onclick="joinRoom()" style="width: 30%; font-size: 14px; padding: 8px; display: inline-block;">参加</button>
    </div>

    <div id="current-number">?</div>
    
    <div id="host-controls" style="display: none;">
        <button id="draw-btn" onclick="drawNumber()">数字を引く！</button>
        <button onclick="resetBingo()" style="background: #636e72; font-size: 14px;">リセット</button>
    </div>

    <div style="font-weight: bold; color: #636e72; margin-top: 20px;">出た数字の履歴</div>
    <div id="history"></div>
</div>

<script>
    let peer = new Peer();
    let conn = null; // ビューアー用
    let connections = []; // ホスト用（全参加者リスト）
    let numbers = Array.from({length: 75}, (_, i) => i + 1);
    let history = [];
    let isHost = false;

    // IDが生成されたら表示
    peer.on('open', (id) => {
        document.getElementById('room-id-display').innerText = id;
    });

    // 【ホスト側】参加者が接続してきた時の処理
    peer.on('connection', (c) => {
        isHost = true;
        connections.push(c);
        updateRoleDisplay('運営者');
        document.getElementById('host-controls').style.display = 'block';
        document.getElementById('setup').style.backgroundColor = '#fff9db';
        
        // 接続した瞬間に現在の状態を送る
        c.on('open', () => {
            c.send({ type: 'sync', history: history, current: history[history.length-1] || '?' });
        });
    });

    // 【ビューアー側】ホストに参加する
    function joinRoom() {
        const targetId = document.getElementById('join-id').value;
        conn = peer.connect(targetId);
        
        conn.on('open', () => {
            isHost = false;
            updateRoleDisplay('参加者');
            document.getElementById('setup').style.display = 'none';
            document.getElementById('host-controls').style.display = 'none';
        });

        conn.on('data', (data) => {
            if (data.type === 'shuffle') {
                startShuffleEffect(false);
            } else if (data.type === 'result') {
                stopShuffleEffect(data.number, data.history);
            } else if (data.type === 'sync') {
                updateUI(data.current, data.history);
            }
        });
    }

    function updateRoleDisplay(role) {
        const badge = role === '運営者' ? '<span class="badge host-badge">運営者モード</span>' : '<span class="badge viewer-badge">参加者モード（同期中）</span>';
        document.getElementById('role-display').innerHTML = badge;
    }

    let shuffleInterval;
    function startShuffleEffect(sendSignal = true) {
        const display = document.getElementById('current-number');
        if (sendSignal && isHost) {
            connections.forEach(c => c.send({ type: 'shuffle' }));
        }
        
        let count = 0;
        shuffleInterval = setInterval(() => {
            display.innerText = Math.floor(Math.random() * 75) + 1;
        }, 80);
    }

    function stopShuffleEffect(number, newHistory) {
        clearInterval(shuffleInterval);
        updateUI(number, newHistory);
    }

    function updateUI(current, newHistory) {
        document.getElementById('current-number').innerText = current;
        history = newHistory;
        const historyDiv = document.getElementById('history');
        historyDiv.innerHTML = "";
        history.slice().reverse().forEach((num, index) => {
            const span = document.createElement('div');
            span.className = 'history-item' + (index === 0 ? ' last-digit' : '');
            span.innerText = num;
            historyDiv.appendChild(span);
        });
    }

    // 【ホスト専用】数字を引く
    function drawNumber() {
        if (numbers.length === 0) return alert("終了です");
        
        const btn = document.getElementById('draw-btn');
        btn.disabled = true;
        
        startShuffleEffect(true);

        setTimeout(() => {
            const randomIndex = Math.floor(Math.random() * numbers.length);
            const drawn = numbers.splice(randomIndex, 1)[0];
            history.push(drawn);
            
            stopShuffleEffect(drawn, history);
            connections.forEach(c => c.send({ type: 'result', number: drawn, history: history }));
            btn.disabled = false;
        }, 3000); // 3秒間シャッフル
    }

    function resetBingo() {
        if (!confirm("リセットしますか？")) return;
        numbers = Array.from({length: 75}, (_, i) => i + 1);
        history = [];
        const data = { type: 'sync', history: [], current: '?' };
        updateUI('?', []);
        connections.forEach(c => c.send(data));
    }
</script>
</body>
</html>
