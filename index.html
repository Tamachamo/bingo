<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BINGO LIVE Pro - Debug version</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* デザインはそのまま、エラー表示用スタイルを追加 */
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .badge { display: inline-block; padding: 5px 15px; border-radius: 20px; font-size: 12px; margin-bottom: 10px; font-weight: bold; }
        .host-badge { background: #ffeaa7; color: #d63031; }
        .viewer-badge { background: #dfe6e9; color: #636e72; }
        #current-number { font-size: 100px; font-weight: bold; color: #e74c3c; margin: 20px 0; background: #fff5f5; border-radius: 15px; height: 140px; display: flex; align-items: center; justify-content: center; }
        button { font-size: 16px; padding: 12px; width: 100%; border-radius: 50px; border: none; background: #0984e3; color: white; cursor: pointer; margin-bottom: 10px; }
        #history { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; }
        .history-item { width: 30px; height: 30px; line-height: 30px; background: #dfe6e9; border-radius: 50%; font-size: 12px; }
        /* デバッグ用 */
        #debug-log { font-size: 10px; color: #e74c3c; margin-top: 20px; text-align: left; background: #eee; padding: 10px; border-radius: 5px; max-height: 100px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="container">
    <div id="status-badge"><span class="badge">起動中...</span></div>
    <h1>🎉 BINGO LIVE</h1>

    <div id="setup-host" style="display:none;">
        <button onclick="copyInviteURL()" style="background: #00b894;">招待URLをコピー</button>
        <div id="copy-msg" style="display:none; font-size:12px; color:green;">コピー完了！</div>
    </div>

    <div id="current-number">?</div>
    
    <div id="host-controls" style="display: none;">
        <button id="draw-btn" onclick="drawNumber()">数字を引く！</button>
        <button onclick="resetBingo()" style="background: #636e72;">リセット</button>
    </div>

    <div style="font-size:14px; color:#666;">履歴</div>
    <div id="history"></div>

    <div id="debug-log">Log: Ready...</div>
</div>

<script>
    const log = (msg) => {
        const div = document.getElementById('debug-log');
        div.innerHTML += `<div>> ${msg}</div>`;
        div.scrollTop = div.scrollHeight;
    };

    const urlParams = new URLSearchParams(window.location.search);
    const joinId = urlParams.get('id');
    let peer = new Peer();
    let isHost = !joinId;
    let numbers = JSON.parse(localStorage.getItem('bingo_numbers')) || Array.from({length: 75}, (_, i) => i + 1);
    let history = JSON.parse(localStorage.getItem('bingo_history')) || [];
    let connections = [];

    peer.on('open', (id) => {
        log(`Peer ID issued: ${id}`);
        if (isHost) {
            setupHost();
        } else {
            connectToHost(joinId);
        }
    });

    peer.on('error', (err) => {
        log(`Error: ${err.type}`);
        if (err.type === 'peer-disconnected') log('ネットワークが切れました');
        if (err.type === 'browser-http-flush') log('リフレッシュされました');
        if (err.type === 'peer-unavailable') alert('ホストが見つかりません。ホストが再読み込みした可能性があります。URLを再送してもらってください。');
    });

    function setupHost() {
        document.getElementById('status-badge').innerHTML = '<span class="badge host-badge">運営者</span>';
        document.getElementById('setup-host').style.display = 'block';
        document.getElementById('host-controls').style.display = 'block';
        updateUI(history[history.length-1] || '?', history);
        log('Host standby...');

        peer.on('connection', (c) => {
            log('New participant connected!');
            connections.push(c);
            c.on('open', () => {
                c.send({ type: 'sync', history: history, current: history[history.length-1] || '?' });
            });
        });
    }

    function connectToHost(hostId) {
        log(`Connecting to: ${hostId}...`);
        document.getElementById('status-badge').innerHTML = '<span class="badge viewer-badge">参加者：接続中...</span>';
        
        let conn = peer.connect(hostId);
        conn.on('open', () => {
            log('Connected to host!');
            document.getElementById('status-badge').innerHTML = '<span class="badge viewer-badge">参加者：同期中 ✅</span>';
        });

        conn.on('data', (data) => {
            if (data.type === 'shuffle') startShuffle();
            if (data.type === 'result' || data.type === 'sync') {
                clearInterval(shuffleInterval);
                updateUI(data.current || data.number, data.history);
            }
        });
    }

    function copyInviteURL() {
        const inviteURL = window.location.origin + window.location.pathname + '?id=' + peer.id;
        navigator.clipboard.writeText(inviteURL).then(() => {
            document.getElementById('copy-msg').style.display = 'block';
            log('Invite URL copied.');
        });
    }

    let shuffleInterval;
    function startShuffle() {
        const display = document.getElementById('current-number');
        shuffleInterval = setInterval(() => {
            display.innerText = Math.floor(Math.random() * 75) + 1;
        }, 80);
    }

    function drawNumber() {
        if (numbers.length === 0) return;
        const btn = document.getElementById('draw-btn');
        btn.disabled = true;
        connections.forEach(c => c.send({ type: 'shuffle' }));
        startShuffle();
        setTimeout(() => {
            const drawn = numbers.splice(Math.floor(Math.random() * numbers.length), 1)[0];
            history.push(drawn);
            localStorage.setItem('bingo_numbers', JSON.stringify(numbers));
            localStorage.setItem('bingo_history', JSON.stringify(history));
            clearInterval(shuffleInterval);
            updateUI(drawn, history);
            connections.forEach(c => c.send({ type: 'result', number: drawn, history: history }));
            btn.disabled = false;
        }, 3000);
    }

    function updateUI(current, newHistory) {
        document.getElementById('current-number').innerText = current;
        const historyDiv = document.getElementById('history');
        historyDiv.innerHTML = newHistory.slice().reverse().map((n, i) => 
            `<div class="history-item ${i===0?'last-digit':''}" style="${i===0?'background:#ff7675;color:white':''}">${n}</div>`
        ).join('');
    }

    function resetBingo() {
        if(confirm('リセット？')){ localStorage.clear(); location.href = window.location.origin + window.location.pathname; }
    }
</script>
</body>
</html>
